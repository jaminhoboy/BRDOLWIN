<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Terminal bracket esquerdo -->
  <path d="M8 12 L20 12 L20 18 L14 18 L14 46 L20 46 L20 52 L8 52 Z" fill="url(#grad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Terminal bracket direito -->
  <path d="M56 12 L44 12 L44 18 L50 18 L50 46 L44 46 L44 52 L56 52 Z" fill="url(#grad)" filter="url(#glow)" opacity="0.9"/>
  <!-- Gráfico de candlestick estilizado -->
  <rect x="24" y="20" width="4" height="24" rx="1" fill="#34D399" opacity="0.9"/>
  <rect x="30" y="26" width="4" height="18" rx="1" fill="#F87171" opacity="0.9"/>
  <rect x="36" y="16" width="4" height="28" rx="1" fill="#3B82F6" opacity="0.9"/>
</svg>
